<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond sombre arrondi -->
  <rect width="32" height="32" rx="8" fill="#050b10"/>
  
  <!-- Bordure lumineuse -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="7.5" fill="none" stroke="#00f2ff" stroke-opacity="0.2"/>
  
  <!-- Lettre T stylisée -->
  <path d="M9 10h14M16 10v12" stroke="#00f2ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Curseur de terminal clignotant (underscore) -->
  <rect x="18" y="22" width="6" height="2" fill="#00f2ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite" />
  </rect>
</svg>
